<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h3>Star Wars Lightsaber Site!</h3>
        <button id="saberButton">Click to generate random a random lightsaber!</button>
        <div id = "saberArea">  
            
        </div>
        <script>
            document.getElementById("saberButton").addEventListener("click", generateImage);
            function generateImage(){               
                var saberArray = ["Blue", "Green", "Purple", "Red", "RedDuel"];
                var randomNum = Math.floor(Math.random() * saberArray.length);
                var randomColor = saberArray[randomNum];
                var createdImage = document.createElement("IMG");
                createdImage.src = "Sabers/" + randomColor + ".png"; 
                createdImage.id = "saber";
                createdImage.width = "268";  
                createdImage.height = "280";
                if(document.getElementById("saberArea").children.length > 0){
                    var curImage = document.getElementById("saber");
                    curImage.remove();
                    while(curImage.src === createdImage.src){
                        randomNum = Math.floor(Math.random() * saberArray.length);
                        randomColor = saberArray[randomNum];
                        createdImage = document.createElement("IMG");
                        createdImage.src = "Sabers/" + randomColor + ".png"; 
                        createdImage.id = "saber";  
                        createdImage.width = "268";
                        createdImage.height = "280";
                    }
                }
                document.getElementById("saberArea").append(createdImage);
           }
        </script>
    </body>
</html>
